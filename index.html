<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0810" />
    <meta name="description" content="Ringward — a creature-squad climb into the rings. Build a squad, brave the wayside, reach the Drop." />
    <title>Ringward</title>
    <!-- Share / social cards. og:image is a relative path that works once deployed; swap to
         the painted title key art (/art/bg/title.jpg) when the art instance delivers it, and
         set og:url + an absolute og:image once the production domain is known. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ringward" />
    <meta property="og:description" content="A creature-squad climb into the rings. Build a squad, brave the wayside, reach the Drop." />
    <meta property="og:image" content="/art/cutscene/scene-rings.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ringward" />
    <meta name="twitter:description" content="A creature-squad climb into the rings. Build a squad, brave the wayside, reach the Drop." />
    <meta name="twitter:image" content="/art/cutscene/scene-rings.jpg" />
    <!-- Three-voice type system (design tokens: src/data/designTokens.js) —
         serif Cinzel/Grenze (world voice), sans Hanken Grotesk (tools), mono Space Mono (numbers). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Grenze:ital,wght@0,500;0,700;1,400&family=Hanken+Grotesk:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; background: #120E08; color: #EFE6D6;
             font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
