<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Ringward: concentric rings closing on the Drop (ember rim → violet core). -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a1226"/>
      <stop offset="100%" stop-color="#08060c"/>
    </radialGradient>
    <radialGradient id="drop" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#b06bff"/>
      <stop offset="100%" stop-color="#b06bff00"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- eight rings, ember outer warming to violet inner -->
  <g fill="none">
    <circle cx="32" cy="32" r="27" stroke="#e8703a" stroke-width="1.4" opacity="0.55"/>
    <circle cx="32" cy="32" r="23" stroke="#e8853a" stroke-width="1.5" opacity="0.6"/>
    <circle cx="32" cy="32" r="19" stroke="#d98f5a" stroke-width="1.6" opacity="0.65"/>
    <circle cx="32" cy="32" r="15.5" stroke="#a987c8" stroke-width="1.7" opacity="0.72"/>
    <circle cx="32" cy="32" r="12" stroke="#9a7fd0" stroke-width="1.8" opacity="0.8"/>
    <circle cx="32" cy="32" r="8.5" stroke="#b06bff" stroke-width="2" opacity="0.9"/>
  </g>
  <!-- the Drop -->
  <circle cx="32" cy="32" r="10" fill="url(#drop)"/>
  <circle cx="32" cy="32" r="3.2" fill="#ffffff"/>
</svg>
